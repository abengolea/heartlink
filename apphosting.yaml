# Firebase App Hosting Configuration - FORCE DEPLOY v2.9.0
# DEPLOY: SECURE SECRETS - API Keys Hidden from GitHub
runConfig:
  cpu: 1
  memoryMiB: 512
  maxInstances: 10
  minInstances: 0
  concurrency: 100

env:
  # Firebase Admin SDK
  - variable: FIREBASE_SERVICE_ACCOUNT_KEY
    secret: firebase-service-account-key
    availability:
      - RUNTIME
  - variable: SERVICE_ACCOUNT_KEY
    secret: SERVICE_ACCOUNT_KEY
    availability:
      - RUNTIME

  # Google Gemini AI
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
    availability:
      - RUNTIME
  - variable: GOOGLE_API_KEY
    secret: GOOGLE_API_KEY
    availability:
      - RUNTIME

  # WhatsApp - Recepción vía NotificasHub (Meta → NotificasHub → HeartLink)
  - variable: INTERNAL_SECRET
    value: heartlink_internal_2026
    availability:
      - RUNTIME
  - variable: NOTIFICASHUB_URL
    value: https://notificashub--studio-3864746689-59018.us-east4.hosted.app
    availability:
      - RUNTIME
  - variable: WHATSAPP_ACCESS_TOKEN
    secret: WHATSAPP_ACCESS_TOKEN
    availability:
      - RUNTIME
  - variable: WHATSAPP_PHONE_NUMBER_ID
    secret: WHATSAPP_PHONE_NUMBER_ID
    availability:
      - RUNTIME
  - variable: PHONE_NUMBER_ID
    secret: WHATSAPP_PHONE_NUMBER_ID
    availability:
      - RUNTIME
  - variable: WHATSAPP_TOKEN
    secret: WHATSAPP_ACCESS_TOKEN
    availability:
      - RUNTIME

  # MercadoPago Integration
  - variable: MERCADOPAGO_ACCESS_TOKEN
    secret: MERCADOPAGO_ACCESS_TOKEN
    availability:
      - RUNTIME
  - variable: CRON_SECRET_TOKEN
    value: heartlink-cron-2025
    availability:
      - RUNTIME

  # Firebase Client Configuration - USING SECRETS FOR SECURITY
  # FIREBASE_API_KEY: usado por el backend (login-via-backend). Se lee en RUNTIME.
  - variable: FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: heartlink-f4ftq.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: heartlink-f4ftq
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: heartlink-f4ftq.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "1060964824602"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: NEXT_PUBLIC_FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME

  # Application URL
  - variable: NEXT_PUBLIC_APP_URL
    value: https://heartlink--heartlink-f4ftq.us-central1.hosted.app
    availability:
      - BUILD
      - RUNTIME
  - variable: META_APP_SECRET
    secret: META_APP_SECRET
    availability:
      - RUNTIME
  - variable: DLOCAL_API_KEY
    secret: DLOCAL_API_KEY
  - variable: DLOCAL_SECRET_KEY
    secret: DLOCAL_SECRET_KEY
  - variable: DLOCAL_BASE_URL
    secret: DLOCAL_BASE_URL
  - variable: DLOCAL_WEBHOOK_URL
    secret: DLOCAL_WEBHOOK_URL
  - variable: DLOCAL_RETURN_URL
    secret: DLOCAL_RETURN_URL
  - variable: DLOCAL_SANDBOX
    secret: DLOCAL_SANDBOX
